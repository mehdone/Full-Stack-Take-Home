services:
  postgres:
    image: postgres:16-alpine
    container_name: emissions_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emissions}
      POSTGRES_USER: ${POSTGRES_USER:-emissions}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emissions}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - emissions_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: emissions_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--activedefrag"
      - "yes"
      - "--active-defrag-cycle-min"
      - "5"
      - "--active-defrag-cycle-max"
      - "25"
      - "--active-defrag-ignore-bytes"
      - "100mb"
      - "--active-defrag-threshold-lower"
      - "10"
    volumes:
      - emissions_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:4.2.0
    container_name: emissions_kafka
    restart: unless-stopped
    environment:
      # KRaft single-node (controller + broker on one process)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Two listeners: INTERNAL for other containers, EXTERNAL for the host
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      # EXTERNAL is advertised as the HOST port (9092), not the container port (9094),
      # because that's the address host-side clients (pnpm dev consumer / api) can
      # actually reach via the port mapping below. Setting this to localhost:9094
      # works for the bootstrap connection but breaks the reconnect that follows,
      # because port 9094 is not bound on the host.
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Required for single-broker dev: internal topics can't replicate beyond RF=1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_PORT:-9092}:9094"
    volumes:
      - emissions_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Optional: DB admin UI for reviewers/candidates. Safe to keep.
  # If you don't want extra surface area, remove this service.
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: emissions_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

  # Optional: Kafka UI for reviewers/candidates.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: emissions_kafka_ui
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["tools"]

  # ── Application services (docker compose --profile apps up -d) ───────────────
  # These are gated behind the "apps" profile so `pnpm infra:up` (which runs
  # `docker compose up -d` with no profile) still brings up infra only.
  # Reviewers who want the full stack: docker compose --profile apps up -d

  alerting:
    container_name: emissions_alerting
    build:
      context: .
      dockerfile: apps/alerting/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4100"
    ports:
      - "4100:4100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles: ["apps"]

  api:
    container_name: emissions_api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-emissions}:${POSTGRES_PASSWORD:-emissions}@postgres:5432/${POSTGRES_DB:-emissions}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    profiles: ["apps"]

  web:
    container_name: emissions_web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_BASE_URL is baked in at build time; it must be reachable
        # from the end-user's browser, so we use localhost (not the container name).
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Used by Server Components / RSC fetches running inside the container —
      # the browser-facing URL (localhost:3000) doesn't resolve from in here.
      INTERNAL_API_BASE_URL: http://api:3000
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    profiles: ["apps"]

  consumer:
    container_name: emissions_consumer
    build:
      context: .
      dockerfile: apps/consumer/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-emissions}:${POSTGRES_PASSWORD:-emissions}@postgres:5432/${POSTGRES_DB:-emissions}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    profiles: ["apps"]

  outbox-relay:
    container_name: emissions_outbox_relay
    build:
      context: .
      dockerfile: apps/outbox-relay/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-emissions}:${POSTGRES_PASSWORD:-emissions}@postgres:5432/${POSTGRES_DB:-emissions}
      ALERTING_URL: http://alerting:4100
    depends_on:
      postgres:
        condition: service_healthy
      alerting:
        condition: service_healthy
    profiles: ["apps"]

  metrics-relay:
    container_name: emissions_metrics_relay
    build:
      context: .
      dockerfile: apps/metrics-relay/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-emissions}:${POSTGRES_PASSWORD:-emissions}@postgres:5432/${POSTGRES_DB:-emissions}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["apps"]

  system-alerts:
    container_name: emissions_system_alerts
    build:
      context: .
      dockerfile: apps/system-alerts/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-emissions}:${POSTGRES_PASSWORD:-emissions}@postgres:5432/${POSTGRES_DB:-emissions}
      ALERTING_URL: http://alerting:4100
    depends_on:
      postgres:
        condition: service_healthy
      alerting:
        condition: service_healthy
    profiles: ["apps"]

volumes:
  emissions_pg_data:
  emissions_redis_data:
  emissions_kafka_data:
